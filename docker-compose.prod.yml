name: professional
services:
  pramanaledger:
    image: professional-pramanaledger:latest
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    container_name: professional-pramanaledger
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8075/health >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    expose:
      - "8075"
    networks:
      - platform_edge
      - professional_net
networks:
  platform_edge:
    external: true
  professional_net:
    external: true
